<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

#display{
    width:310px;
    height:50px;
    font-size:22px;
    margin-bottom:10px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:6px;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

button{
    height:55px;
    font-size:18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.number{
    background:#e2e8f0;
}

.operator{
    background:#38bdf8;
    color:white;
}

.equal{
    background:#22c55e;
    color:white;
    grid-column: span 2;
}

.clear{
    background:#ef4444;
    color:white;
}
</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="append('/')">/</button>
<button class="operator" onclick="append('*')">*</button>
<button class="operator" onclick="append('-')">-</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="number" onclick="append('.')">.</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="number" onclick="append('0')">0</button>

<button class="equal" onclick="calculate()">=</button>

</div>
</div>

<script>

function append(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function calculate(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }
    catch{
        alert("Invalid Calculation");
    }
}

</script>

</body>
</html>
